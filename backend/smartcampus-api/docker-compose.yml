services:
  api:
    build: .
    container_name: smartcampus-api
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "backend-isu.gstou.ru:31.173.210.220"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_PORT: 8080
      DATABASE_URL: postgres://smartcampus:smartcampus_password@postgres:5432/smartcampus?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      JWT_SECRET: change_me_for_local_demo
      JWT_ACCESS_TTL: 24h
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      AI_PROVIDER: ${AI_PROVIDER:-openai_compatible}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_PROXY_URL: ${AI_PROXY_URL:-}
      ISU_PROXY_URL: ${ISU_PROXY_URL:-}
      ALLOW_PUBLIC_ADMIN_REGISTER: "false"
      RATE_LIMIT_LOGIN_PER_MINUTE: 5
      RATE_LIMIT_REGISTER_PER_MINUTE: 3
      RATE_LIMIT_API_PER_MINUTE: 100
      RATE_LIMIT_AI_PER_MINUTE: 20
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: smartcampus-postgres
    environment:
      POSTGRES_USER: smartcampus
      POSTGRES_PASSWORD: smartcampus_password
      POSTGRES_DB: smartcampus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcampus -d smartcampus"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8
    container_name: smartcampus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:latest
    container_name: smartcampus-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
