            schema: { $ref: '#/components/schemas/AttendanceSessionCreateRequest' }
      responses:
        '201':
          description: Created session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttendanceSession' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /attendance/sessions/{id}/records:
    get:
      tags: [Attendance]
      summary: List records for a session (teacher/admin)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200':
          description: Records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AttendanceRecord' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Attendance]
      summary: Mark attendance (upsert records) (teacher/admin)
      description: Teachers can only mark sessions they own.
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MarkAttendanceRequest' }
      responses:
        '200':
          description: Upserted records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AttendanceRecord' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /attendance/my:
    get:
      tags: [Attendance]
      summary: Own attendance records (students)
      responses:
        '200':
          description: Records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AttendanceRecord' }
        '403': { $ref: '#/components/responses/Forbidden' }
