  /applicant-faq:
    get:
      tags: [FAQ]
      security: []
      summary: Public list of active FAQ entries
      responses:
        '200':
          description: FAQ
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApplicantFAQ' }
    post:
      tags: [FAQ]
      summary: Create FAQ entry (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApplicantFAQUpsertRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicantFAQ' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /applicant-faq/search:
    get:
      tags: [FAQ]
      security: []
      summary: Public FAQ full-text search
      parameters:
        - { name: q, in: query, required: false, schema: { type: string }, description: Substring match on question/answer/category/keywords. }
      responses:
        '200':
          description: FAQ (top 10)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApplicantFAQ' }
  /applicant-faq/{id}:
    patch:
      tags: [FAQ]
      summary: Update FAQ entry (admin only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApplicantFAQUpsertRequest' }
      responses:
        '200':
          description: FAQ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicantFAQ' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [FAQ]
      summary: Delete FAQ entry (admin only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

