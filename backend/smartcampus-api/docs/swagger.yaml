  # ============================================================
  # Library
  # ============================================================
  /library/books:
    post:
      tags: [Library]
      summary: Create a book (librarian/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryBookUpsertRequest' }
      responses:
        '201':
          description: Created book
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryBook' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /library/books/search:
    get:
      tags: [Library]
      summary: Search library books
      parameters:
        - { name: q, in: query, required: false, schema: { type: string }, description: Substring match in title and description. }
        - { name: author, in: query, required: false, schema: { type: string }, description: Case-insensitive author filter. }
        - { name: category, in: query, required: false, schema: { type: string }, description: Exact category match. }
      responses:
        '200':
          description: Books (max 50)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LibraryBook' }
  /library/books/{id}:
    get:
      tags: [Library]
      summary: Get book by ID
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200':
          description: Book
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryBook' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Library]
      summary: Update a book (librarian/admin)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryBookUpsertRequest' }
      responses:
        '200':
          description: Book
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryBook' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /library/books/{id}/borrow:
    post:
      tags: [Library]
      summary: Borrow a book as current student/teacher
      description: |
        Creates an active loan for the current user. If `dueAt` is omitted, defaults to `now + 14 days`.
        Returns 409 if no available copies or the user already has an active loan for this book.
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowBookRequest' }
      responses:
        '201':
          description: Loan with embedded book
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryLoan' }
        '400': { $ref: '#/components/responses/Validation' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /library/loans:
    get:
      tags: [Library]
      summary: List loans (librarian/admin)
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [active, returned, overdue] } }
      responses:
        '200':
          description: Loans (with embedded `book`)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LibraryLoan' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Library]
      summary: Create a loan for a user (librarian/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryLoanCreateRequest' }
      responses:
        '201':
          description: Loan with embedded book
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryLoan' }
        '400': { $ref: '#/components/responses/Validation' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /library/loans/my:
    get:
      tags: [Library]
      summary: Own loans (student/teacher)
      responses:
        '200':
          description: Own loans (with embedded `book`)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LibraryLoan' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /library/loans/{id}/return:
    patch:
      tags: [Library]
      summary: Return a loan (librarian/admin)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200':
          description: Returned loan (with embedded `book`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryLoan' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

