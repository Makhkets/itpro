services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: smartcampus
      POSTGRES_PASSWORD: smartcampus_password
      POSTGRES_DB: smartcampus_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcampus -d smartcampus_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
